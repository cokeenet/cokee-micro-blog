name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # 这一步是 OIDC 验证必须的，用来获取 Azure 访问令牌
      - name: Install OIDC Client
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # 使用你仓库中保存的 Secret 名称
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_HILL_044A27700 }}
          action: "upload"
          
          ###### 构建配置 ######
          app_location: "/frontend"   # 源代码在仓库的 frontend 目录下
          api_location: ""            # 如果没有后端 API 则留空
          output_location: "dist"     # 编译产物在 frontend/dist 目录下（相对于 app_location）
          
          # 开启 Oryx 自动构建（设为 false 或删除 skip 行）
          skip_app_build: false
          skip_api_build: true
          
          # 传递 OIDC 身份令牌
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### 构建配置结束 ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_HILL_044A27700 }}
          action: "close"
