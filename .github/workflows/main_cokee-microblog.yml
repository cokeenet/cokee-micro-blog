# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - cokee-microblog

on:
  push:
    branches:
      - main
    # 仅当后端目录代码发生变动时才触发部署，节省 Action 额度
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  # 设置后端 API 项目的相对路径
  API_PROJECT_PATH: 'backend/Cokee.MicroBlog.Api/Cokee.MicroBlog.Api.csproj'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          # 修改为您项目实际使用的 .NET 9
          dotnet-version: '9.0.x'

      - name: Build with dotnet
        # 指定明确的项目路径进行构建
        run: dotnet build ${{ env.API_PROJECT_PATH }} --configuration Release

      - name: dotnet publish
        # 指定明确的项目路径进行发布
        run: dotnet publish ${{ env.API_PROJECT_PATH }} -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cokee-microblog'
          slot-name: 'Production'
          package: .
