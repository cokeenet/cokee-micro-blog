version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: microblog-backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Port=3308;Database=CokeeMicroBlog;User=root;***REMOVED***
    restart: unless-stopped
    networks:
      - microblog-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: microblog-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - microblog-net

networks:
  microblog-net:
    driver: bridge